<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up - BLOOM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Lora:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="signin-page register-page">
    <header class="top-nav">
      <a href="index.html" class="brand-link">
        <div class="brand-container">
          <div class="brand-logo">🌸</div>
          <div class="brand">
            <span class="bloom-text">BLOOM</span>
            <div class="brand-tagline">
              <span>Botanical Locator</span>
              <span>and Orchid Observation</span>
              <span>Mapping System</span>
            </div>
          </div>
        </div>
      </a>
      <div class="auth-actions"></div>
    </header>

    <main class="signin-container">
      <aside class="signin-image-wrapper" aria-hidden="true">
        <img src="./queen victoria.jpg" alt="Queen Victoria's Dendrobium" class="signin-image" />
        <div class="signin-image-label">
          <p class="orchid-name">QUEEN VICTORIA'S DENDROBIUM</p>
          <p class="orchid-species">Dendrobium victoriae-reginae Schitr.</p>
        </div>
      </aside>

      <section class="signin-form-wrapper">
        <div class="signin-form">
          <h1 class="signin-heading">Sign up</h1>
          
          <form>
            <input type="text" placeholder="First name" class="form-input" required />
            <input type="text" placeholder="Last name" class="form-input" required />
            <input type="email" placeholder="Email" class="form-input" required />
            <input type="date" placeholder="Birth date" class="form-input" required />
            <input type="tel" placeholder="Phone number" class="form-input" required />
            <input type="password" placeholder="Password" class="form-input" required />
            <input type="password" placeholder="Confirm password" class="form-input" required />
            
            <button type="submit" class="signin-btn">Sign Up</button>
            
            <p class="signin-footer">
              Already have an account? <a href="signin.html" class="signin-link">Log In</a>
            </p>
          </form>
        </div>
      </section>
    </main>
  </body>
</html>
