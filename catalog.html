<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Orchid Catalog - BLOOM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Lora:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="signin-page">
    <header class="top-nav">
      <a href="index.html" class="brand-link">
        <div class="brand-container">
          <div class="brand-logo">🌸</div>
          <div class="brand">
            <span class="bloom-text">BLOOM</span>
            <div class="brand-tagline">
              <span>Botanical Locator</span>
              <span>and Orchid Observation</span>
              <span>Mapping System</span>
            </div>
          </div>
        </div>
      </a>
      <div class="auth-actions"></div>
    </header>

    <main class="catalog-container">
      <div class="catalog-header">
        <h1 class="catalog-title">Orchid Catalog</h1>
        <div class="catalog-search-wrapper">
          <input type="text" placeholder="🔍 Search orchids..." class="catalog-search" id="search-input" />
        </div>
      </div>

      <div class="catalog-grid" id="catalog-grid">
        <div class="orchid-card">
          <img src="./orchid1.webp" alt="Abdominea" class="orchid-card-image" />
          <div class="orchid-card-info">
            <p class="orchid-card-name">Abdominea</p>
            <p class="orchid-card-genus">Genus</p>
          </div>
        </div>

        <div class="orchid-card">
          <img src="./orchid2.jpg" alt="Acanthephippium" class="orchid-card-image" />
          <div class="orchid-card-info">
            <p class="orchid-card-name">Acanthephippium</p>
            <p class="orchid-card-genus">Genus</p>
          </div>
        </div>

        <div class="orchid-card">
          <img src="./orchid3.webp" alt="Acriopsis" class="orchid-card-image" />
          <div class="orchid-card-info">
            <p class="orchid-card-name">Acriopsis</p>
            <p class="orchid-card-genus">Genus</p>
          </div>
        </div>

        <div class="orchid-card">
          <img src="./ghost orchid.webp" alt="Adenoncos" class="orchid-card-image" />
          <div class="orchid-card-info">
            <p class="orchid-card-name">Adenoncos</p>
            <p class="orchid-card-genus">Genus</p>
          </div>
        </div>

        <div class="orchid-card">
          <img src="./orchid1.webp" alt="Aerides" class="orchid-card-image" />
          <div class="orchid-card-info">
            <p class="orchid-card-name">Aerides</p>
            <p class="orchid-card-genus">Genus</p>
          </div>
        </div>

        <div class="orchid-card">
          <img src="./orchid2.jpg" alt="Aeridostachya" class="orchid-card-image" />
          <div class="orchid-card-info">
            <p class="orchid-card-name">Aeridostachya</p>
            <p class="orchid-card-genus">Genus</p>
          </div>
        </div>

        <div class="orchid-card">
          <img src="./orchid3.webp" alt="Aerobacterium" class="orchid-card-image" />
          <div class="orchid-card-info">
            <p class="orchid-card-name">Aerobacterium</p>
            <p class="orchid-card-genus">Genus</p>
          </div>
        </div>

        <div class="orchid-card">
          <img src="./ghost orchid.webp" alt="Aeris" class="orchid-card-image" />
          <div class="orchid-card-info">
            <p class="orchid-card-name">Aeris</p>
            <p class="orchid-card-genus">Genus</p>
          </div>
        </div>
      </div>
    </main>

    <script>
      document.getElementById('search-input').addEventListener('input', function(e) {
        const searchTerm = e.target.value.toLowerCase();
        const cards = document.querySelectorAll('.orchid-card');
        
        cards.forEach(card => {
          const name = card.querySelector('.orchid-card-name').textContent.toLowerCase();
          if (name.includes(searchTerm)) {
            card.style.display = 'block';
          } else {
            card.style.display = 'none';
          }
        });
      });
    </script>
  </body>
</html>
