<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up - BLOOM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="signin-page register-page bg-light">
    <header class="top-nav navbar navbar-expand-lg px-3 px-md-4">
      <a href="index.html" class="brand-link">
        <div class="brand-container">
          <div class="brand-logo">
            <img src="./loo.png" alt="Orchid logo" class="brand-logo-image" />
          </div>
          <div class="brand">
            <span class="bloom-text">BLOOM</span>
            <div class="brand-tagline">
              <span>Botanical Locator</span>
              <span>and Orchid Observation</span>
              <span>Mapping System</span>
            </div>
          </div>
        </div>
      </a>
      <div class="auth-actions"></div>
    </header>

    <main class="signin-container container-fluid">
      <aside class="signin-image-wrapper" aria-hidden="true">
        <img src="./queen victoria.jpg" alt="Queen Victoria's Dendrobium" class="signin-image" />
        <div class="signin-image-label">
          <p class="orchid-name">QUEEN VICTORIA'S DENDROBIUM</p>
          <p class="orchid-species">Dendrobium victoriae-reginae Schitr.</p>
        </div>
      </aside>

      <section class="signin-form-wrapper">
        <div class="signin-form">
          <h1 class="signin-heading">Sign up</h1>
          
          <form id="register-form" class="needs-validation" novalidate>
            <input type="text" placeholder="First name" class="form-input form-control" id="first-name" required />
            <input type="text" placeholder="Last name" class="form-input form-control" id="last-name" required />
            <input type="email" placeholder="Email" class="form-input form-control" id="email" required />
            <input type="date" placeholder="Birth date" class="form-input form-control" id="birth-date" required />
            <input type="tel" placeholder="Phone number" class="form-input form-control" id="phone" required />
            <input type="password" placeholder="Password" class="form-input form-control" id="password" required />
            <input type="password" placeholder="Confirm password" class="form-input form-control" id="confirm-password" required />
            
            <button type="submit" class="signin-btn btn btn-primary w-100">Sign Up</button>
            
            <p class="signin-footer small text-muted mb-0">
              Already have an account? <a href="signin.html" class="signin-link">Log In</a>
            </p>
          </form>
        </div>
      </section>
    </main>

    <script>
      document.getElementById('register-form').addEventListener('submit', async function(e) {
        e.preventDefault();

        const firstName = document.getElementById('first-name').value.trim();
        const lastName = document.getElementById('last-name').value.trim();
        const email = document.getElementById('email').value.trim();
        const birthDate = document.getElementById('birth-date').value;
        const phone = document.getElementById('phone').value.trim();
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirm-password').value;

        if (password !== confirmPassword) {
          alert('Passwords do not match.');
          return;
        }

        try {
          const response = await fetch('/api/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ firstName, lastName, email, birthDate, phone, password })
          });

          const data = await response.json();

          if (!response.ok) {
            alert(data.message || 'Registration failed');
            return;
          }

          const loginResponse = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
          });

          const loginData = await loginResponse.json();

          if (!loginResponse.ok || !loginData.user) {
            alert('Registration successful. Please sign in.');
            window.location.href = 'signin.html';
            return;
          }

          localStorage.setItem('bloomUser', JSON.stringify(loginData.user));
          const role = (loginData.user.role || '').trim().toLowerCase();
          if (role === 'researcher' || role === 'admin' || role === 'user') {
            window.location.href = 'dashboard.html';
          } else {
            window.location.href = 'catalog.html';
          }
        } catch (error) {
          alert('Could not connect to server. Please try again.');
        }
      });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
