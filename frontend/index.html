<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BLOOM Botanical Locator and Orchid Observation Mapping System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="signin-page index-page bg-light">
    <header class="top-nav navbar navbar-expand-lg px-3 px-md-4">
      <a href="index.html" class="brand-link" id="index-brand-link">
        <div class="brand-container">
          <div class="brand-logo">
            <img src="./loo.png" alt="Orchid logo" class="brand-logo-image" />
          </div>
          <div class="brand">
            <span class="bloom-text">BLOOM</span>
            <div class="brand-tagline">
              <span>Botanical Locator</span>
              <span>and Orchid Observation</span>
              <span>Mapping System</span>
            </div>
          </div>
        </div>
      </a>
      <div class="auth-actions d-flex align-items-center gap-2">
        <a href="signin.html" class="btn btn-ghost btn-outline-secondary">Sign In</a>
        <a href="register.html" class="btn btn-solid btn-success">Register</a>
      </div>
    </header>

    <main class="hero container-fluid py-3">
      <section class="hero-copy">
        <h1>GET BLOOM3D!</h1>
        <p class="hero-description">Botanical Locator and Orchid Observation Mapping System 3D offers a wide catalog of orchids in Mt. Busa, Kiamba, Sarangani Province.</p>
        <div class="button-group">
          <p class="try-this">TRY US!</p>
          <div class="separator-line"></div>
          <div class="buttons-stack">
            <a href="catalog.html" class="catalog-btn catalog-view">Search</a>
            <span class="or-text">or</span>
            <a href="catalog.html" class="catalog-btn catalog-view">View Catalog</a>
          </div>
        </div>
      </section>

      <aside class="hero-panel" aria-hidden="true">
        <img class="hero-panel-image" src="./indexpic.png" alt="Orchid showcase" />
        <div class="panel-content">
          <p class="panel-label">Orchid Atlas</p>
          <p class="panel-title">Map. Observe. Preserve.</p>
        </div>
      </aside>
    </main>

    <script>
      if (localStorage.getItem('bloomUser')) {
        const indexBrandLink = document.getElementById('index-brand-link');
        indexBrandLink.setAttribute('aria-disabled', 'true');
        indexBrandLink.style.pointerEvents = 'none';
        indexBrandLink.style.cursor = 'default';
      }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
