<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In - BLOOM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="signin-page bg-light">
    <header class="top-nav navbar navbar-expand-lg px-3 px-md-4">
      <a href="index.html" class="brand-link">
        <div class="brand-container">
          <div class="brand-logo">
            <img src="./loo.png" alt="Orchid logo" class="brand-logo-image" />
          </div>
          <div class="brand">
            <span class="bloom-text">BLOOM</span>
            <div class="brand-tagline">
              <span>Botanical Locator</span>
              <span>and Orchid Observation</span>
              <span>Mapping System</span>
            </div>
          </div>
        </div>
      </a>
      <div class="auth-actions"></div>
    </header>

    <main class="signin-container container-fluid">
      <section class="signin-form-wrapper">
        <div class="signin-form">
          <p class="signin-subtitle">Please enter your details</p>
          <h1 class="signin-heading">Welcome back</h1>
          
          <form id="signin-form" class="needs-validation" novalidate>
            <input type="email" placeholder="Email address" class="form-input form-control" id="email" required />
            <input type="password" placeholder="Password" class="form-input form-control" id="password" required />
            
            <div class="form-options d-flex justify-content-between align-items-center flex-wrap gap-2">
              <label class="checkbox-label">
                <input type="checkbox" class="form-check-input" />
                <span>Remember for 30 days</span>
              </label>
              <a href="#" class="forgot-password">Forgot password</a>
            </div>
            
            <button type="submit" class="signin-btn btn btn-primary w-100">Sign In</button>
            
            <p class="signin-footer small text-muted mb-0">
              Don't have an account? <a href="register.html" class="signin-link">Sign Up</a>
            </p>
          </form>
        </div>
      </section>

      <aside class="signin-image-wrapper" aria-hidden="true">
        <img src="./ghost orchid.webp" alt="Ghost Orchid" class="signin-image" />
        <div class="signin-image-label">
          <p class="orchid-name">GHOST ORCHID</p>
          <p class="orchid-species">Dendrophylax lindenii</p>
        </div>
      </aside>
    </main>

    <script>
      document.getElementById('signin-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        try {
          const response = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
          });

          const data = await response.json();

          if (!response.ok) {
            alert(data.message || 'Invalid email or password');
            return;
          }

          localStorage.setItem('bloomUser', JSON.stringify(data.user));
          const role = (data.user?.role || '').trim().toLowerCase();
          if (role === 'admin' || role === 'researcher' || role === 'user') {
            window.location.href = 'dashboard.html';
          } else {
            window.location.href = 'catalog.html';
          }
        } catch (error) {
          alert('Could not connect to server. Please try again.');
        }
      });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
