<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Orchid Gallery - BLOOM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="gallery-page bg-light">
    <header class="top-nav navbar navbar-expand-lg px-3 px-md-4">
      <a href="catalog.html" class="brand-link" id="gallery-brand-link">
        <div class="brand-container">
          <div class="brand-logo">
            <img src="./loo.png" alt="Orchid logo" class="brand-logo-image" />
          </div>
          <div class="brand">
            <span class="bloom-text">BLOOM</span>
            <div class="brand-tagline">
              <span>Botanical Locator</span>
              <span>and Orchid Observation</span>
              <span>Mapping System</span>
            </div>
          </div>
        </div>
      </a>
      <div class="auth-actions d-flex align-items-center gap-2">
        <a href="catalog.html" class="btn btn-solid btn-success" id="gallery-back-link">Back to Catalog</a>
      </div>
    </header>

    <main class="gallery-container container py-4">
      <h1 class="gallery-title" id="gallery-title">Flower Gallery</h1>

      <section class="gallery-grid row row-cols-1 row-cols-sm-2 row-cols-lg-3 g-3" aria-label="Flower gallery images">
        <article class="gallery-item">
          <img src="./catalogicon.png" alt="Gallery image 1" class="gallery-image" />
        </article>
        <article class="gallery-item">
          <img src="./catalogicon.png" alt="Gallery image 2" class="gallery-image" />
        </article>
        <article class="gallery-item">
          <img src="./catalogicon.png" alt="Gallery image 3" class="gallery-image" />
        </article>
        <article class="gallery-item">
          <img src="./catalogicon.png" alt="Gallery image 4" class="gallery-image" />
        </article>
        <article class="gallery-item">
          <img src="./catalogicon.png" alt="Gallery image 5" class="gallery-image" />
        </article>
      </section>
    </main>

    <div class="image-lightbox" id="gallery-image-lightbox" hidden>
      <img src="" alt="Full gallery image" id="gallery-lightbox-image" class="image-lightbox-photo" />
    </div>

    <script>
      const params = new URLSearchParams(window.location.search);
      const flowerName = params.get('name');
      const galleryTitle = document.getElementById('gallery-title');
      const galleryBrandLink = document.getElementById('gallery-brand-link');
      const galleryBackLink = document.getElementById('gallery-back-link');
      const galleryImageLightbox = document.getElementById('gallery-image-lightbox');
      const galleryLightboxImage = document.getElementById('gallery-lightbox-image');

      const activeUser = localStorage.getItem('bloomUser');
      if (activeUser) {
        const dashboardOrchidsLink = 'dashboard.html?view=orchids';
        galleryBrandLink.href = dashboardOrchidsLink;
        galleryBackLink.href = dashboardOrchidsLink;
      }

      function openGalleryLightbox(imageSrc) {
        galleryLightboxImage.src = imageSrc;
        galleryImageLightbox.hidden = false;
      }

      function closeGalleryLightbox() {
        galleryLightboxImage.src = '';
        galleryImageLightbox.hidden = true;
      }

      if (flowerName && flowerName.trim() !== '') {
        galleryTitle.textContent = flowerName.trim();
        galleryTitle.classList.add('scientific-name');
      }

      document.querySelectorAll('.gallery-image').forEach(function(imageEl) {
        imageEl.addEventListener('click', function() {
          openGalleryLightbox(imageEl.src);
        });
      });

      galleryImageLightbox.addEventListener('click', closeGalleryLightbox);

      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && !galleryImageLightbox.hidden) {
          closeGalleryLightbox();
        }
      });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
